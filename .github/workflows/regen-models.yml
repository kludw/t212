name: Regenerate models

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: bash scripts/generate-models.sh

      - uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/regen-models
          title: "chore: regenerate models from T212 schema"
          commit-message: "chore: regenerate models from T212 schema"
          body: |
            Automated regeneration of `models.gen.go` from the latest Trading 212 OpenAPI schema.

            Triggered by the `Regenerate models` workflow.
          add-paths: models.gen.go
          delete-branch: true
