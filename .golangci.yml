version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - errcheck
    - gocritic
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    revive:
      rules:
        # Stylistic noise that does not earn its keep in this codebase.
        - name: unused-parameter
          disabled: true
        - name: package-comments
          disabled: true

  exclusions:
    rules:
      - path: models\.gen\.go
        linters:
          - revive
          - staticcheck
          - errcheck
          - gocritic
          - misspell
          - unused
      - path: _test\.go$
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
